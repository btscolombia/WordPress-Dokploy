services:
  wordpress:
    build:
      context: .
      args:
        PHP_VERSION: ${PHP_VERSION:-82}
    volumes:
      - wp_app:/var/www/html
    init: true
    env_file: ".env"
    restart: unless-stopped

  mail-relay:
    build: ./mail-relay
    env_file: ".env"
    restart: unless-stopped

  mariadb:
    build: ./mariadb
    env_file: ".env"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME:-wordpress}
      MYSQL_USER: ${WORDPRESS_DB_USER:-wordpress}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress_password}
      MARIADB_AUTO_UPGRADE: ${MARIADB_AUTO_UPGRADE:-1}

  valkey:
    image: valkey/valkey:latest
    command: valkey-server --protected-mode no --maxmemory ${VALKEY_MAX_MEMORY:-64mb} --maxmemory-policy allkeys-lru --save ""
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    profiles:
      - tools
    environment:
      PMA_HOST: mariadb
      UPLOAD_LIMIT: 64M
    depends_on:
      - mariadb
    restart: unless-stopped

  filemanager:
    build: ./filemanager
    profiles:
      - tools
    environment:
      TFM_USERNAME: ${FILEMANAGER_USER:-admin}
      TFM_PASSWORD: ${FILEMANAGER_PASSWORD:-admin123}
      TFM_ROOT: /var/www/html/wp
    volumes:
      - wp_app:/var/www/html/wp
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    profiles:
      - debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    profiles:
      - mailpit
    restart: unless-stopped

volumes:
  wp_app:
  db_data:
